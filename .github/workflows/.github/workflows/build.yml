name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        uses: zmkfirmware/zmk-build-action@v3
        with:
          board: nice_nano_v2
          shield: myboard
