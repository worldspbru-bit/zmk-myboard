name: Build ZMK Firmware

on:
  push:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout config
        uses: actions/checkout@v4
      
      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          ref: main
          path: zmk
          submodules: recursive
      
      - name: Copy config
        run: |
          cp -r config/* zmk/app/config/
          cp config/west.yml zmk/west.yml || true
      
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            zmk/modules/
            zmk/build/
          key: ${{ runner.os }}-zmk-${{ hashFiles('zmk/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-
      
      - name: Initialize west
        working-directory: zmk
        run: |
          west init -l app
          west update
          west zephyr-export
      
      - name: Build firmware
        working-directory: zmk
        run: |
          west build -p=always -b nice_nano_v2 app -- \
            -DSHIELD=myboard \
            -DZMK_CONFIG=${GITHUB_WORKSPACE}/config
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zmk/build/zephyr/zmk.uf2
